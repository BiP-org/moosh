name: Build Debian package

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debian-package.yml'
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential composer php-cli

      - name: Build Debian package
        run: |
          mkdir -p .build
          tmpdir="$(mktemp -d -p "$PWD/.build" moosh-deb-XXXXXX)"
          mkdir -p "$tmpdir/src"
          find . -mindepth 1 -maxdepth 1 \( ! -name '.build' ! -name '.git' ! -name '.github' \) -exec cp -a {} "$tmpdir/src/" \;
          cd "$tmpdir/src"
          chmod +x debian/rules
          dpkg-buildpackage -us -uc -b -d
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp "$tmpdir"/moosh_*.deb "$GITHUB_WORKSPACE/dist/"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-package
          path: |
            dist/*.deb
