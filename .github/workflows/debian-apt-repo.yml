name: Publish Debian apt repository

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Debian package"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Debian package artifact
        uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id || github.run_id }}

      - name: Install package publishing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg

      - name: Prepare repository directory
        run: |
          mkdir -p public
          touch public/.nojekyll
          find dist -maxdepth 1 -type f -name '*.deb' -exec cp {} public/ \;

      - name: Create apt repository
        uses: m-vanwyk/apt-repo-action@v1
        with:
          repo-name: moosh
          github-token: ${{ secrets.GITHUB_TOKEN }}
          package-folder: public
          branch: gh-pages
          gpg-private-key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.APT_GPG_PASSPHRASE }}
