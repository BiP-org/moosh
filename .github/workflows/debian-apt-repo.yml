name: Publish Debian Package to APT repository on github pages

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debian-apt-repo.yml'
  workflow_run:
    workflows: ["Build and Test", "Build Debian package"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

env:
    REPO_NAME: moosh
    CODENAME: bookworm
    COMPONENTS: main
    ARCHITECTURES: amd64
    PAGES_URL: ${{ vars.PAGES_URL || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Debian package artifact
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: debian-package
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id || github.run_id }}

      - name: Install package publishing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg

      - name: Prepare repository directory
        run: |
          mkdir -p public
          touch public/.nojekyll
          find dist -maxdepth 1 -type f -name '*.deb' -exec cp -v {} public/ \;

      - name: Create apt repository
        uses: morph027/apt-repo-action@v3
        id: create-apt-repo
        with:
          scan-dir: public
          maintainer: georg-bip-bot-bildung.gv.at@glas.eu.org
          repo-name: ${{ env.REPO_NAME }}
          signing-key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          signing-key-passphrase: ${{ secrets.APT_GPG_PASSPHRASE || '' }}
          codename: ${{ env.CODENAME }}
          components: ${{ env.COMPONENTS }}
          architectures: ${{ env.ARCHITECTURES }}

      - name: Create README with installation instructions
        run: |
          cat > ${{ steps.create-apt-repo.outputs.dir }}/README.md << 'EOF'
          # ${{ env.REPO_NAME }} Debian Repository
          
          This repository provides Debian packages for ${{ env.REPO_NAME }}.
          
          ## Installation
          
          ### 1. Add the GPG key
          
          ```bash
          curl -sfLo /tmp/${{ env.REPO_NAME }}.asc ${{ env.PAGES_URL }}gpg.key
          sudo mv /tmp/${{ env.REPO_NAME }}.asc /etc/apt/keyrings/${{ env.REPO_NAME }}.asc
          ```
          
          ### 2. Add the repository
          
          ```bash
          echo "deb [signed-by=/etc/apt/keyrings/${{ env.REPO_NAME }}.asc] ${{ env.PAGES_URL }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}" | \
            sudo tee /etc/apt/sources.list.d/${{ env.REPO_NAME }}.list
          ```
          
          ### 3. Update and install
          
          ```bash
          sudo apt update
          sudo apt install moosh
          ```
          
          ## Verification
          
          To verify the package signature:
          
          ```bash
          apt-key adv --keyserver keyserver.ubuntu.com --recv-keys <KEY_ID>
          ```
          
          EOF
          cat ${{ steps.create-apt-repo.outputs.dir }}/README.md

      - name: Create index.html
        run: |
          cat > ${{ steps.create-apt-repo.outputs.dir }}/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${{ env.REPO_NAME }} Debian Repository</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      padding: 20px;
                  }
                  .container {
                      background: white;
                      border-radius: 10px;
                      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                      max-width: 600px;
                      padding: 40px;
                  }
                  h1 {
                      color: #333;
                      margin-bottom: 10px;
                      font-size: 2.5em;
                  }
                  .subtitle {
                      color: #666;
                      margin-bottom: 30px;
                      font-size: 1.1em;
                  }
                  .info-box {
                      background: #f5f5f5;
                      border-left: 4px solid #667eea;
                      padding: 15px;
                      margin: 20px 0;
                      border-radius: 5px;
                  }
                  .info-box strong {
                      color: #667eea;
                  }
                  .section {
                      margin: 30px 0;
                  }
                  .section h2 {
                      color: #333;
                      margin-bottom: 15px;
                      font-size: 1.3em;
                  }
                  code {
                      background: #f0f0f0;
                      padding: 2px 6px;
                      border-radius: 3px;
                      font-family: 'Courier New', monospace;
                      color: #d63384;
                  }
                  .code-block {
                      background: #2d2d2d;
                      color: #f8f8f2;
                      padding: 15px;
                      border-radius: 5px;
                      overflow-x: auto;
                      margin: 10px 0;
                      font-family: 'Courier New', monospace;
                      font-size: 0.9em;
                      line-height: 1.4;
                  }
                  .links {
                      display: flex;
                      gap: 10px;
                      margin: 20px 0;
                      flex-wrap: wrap;
                  }
                  .btn {
                      display: inline-block;
                      padding: 10px 20px;
                      background: #667eea;
                      color: white;
                      text-decoration: none;
                      border-radius: 5px;
                      transition: background 0.3s;
                      border: none;
                      cursor: pointer;
                      font-size: 1em;
                  }
                  .btn:hover {
                      background: #764ba2;
                  }
                  .btn-secondary {
                      background: #6c757d;
                  }
                  .btn-secondary:hover {
                      background: #5a6268;
                  }
                  footer {
                      margin-top: 40px;
                      padding-top: 20px;
                      border-top: 1px solid #eee;
                      color: #999;
                      text-align: center;
                      font-size: 0.9em;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>📦 ${{ env.REPO_NAME }}</h1>
                  <p class="subtitle">Debian Repository</p>
                  
                  <div class="info-box">
                      <strong>Repository URL:</strong><br>
                      <code>${{ env.PAGES_URL }}</code>
                  </div>
                  
                  <div class="section">
                      <h2>Quick Start</h2>
                      <p>Add the GPG key and repository to your system:</p>
                      <div class="code-block">
          curl -sfLo /tmp/${{ env.REPO_NAME }}.asc ${{ env.PAGES_URL }}gpg.key<br>
          sudo mv /tmp/${{ env.REPO_NAME }}.asc /etc/apt/keyrings/${{ env.REPO_NAME }}.asc<br>
          echo "deb [signed-by=/etc/apt/keyrings/${{ env.REPO_NAME }}.asc] ${{ env.PAGES_URL }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}" | \<br>
          &nbsp;&nbsp;sudo tee /etc/apt/sources.list.d/${{ env.REPO_NAME }}.list<br>
          sudo apt update<br>
          sudo apt install ${{ env.REPO_NAME }}
                      </div>
                  </div>
                  
                  <div class="section">
                      <h2>Documentation</h2>
                      <p>For more information, see the full installation instructions:</p>
                      <div class="links">
                          <a href="README.md" class="btn">📖 README</a>
                      </div>
                  </div>
                  
                  <footer>
                      <p>Generated by GitHub Actions - ${{ github.repository }}</p>
                  </footer>
              </div>
          </body>
          </html>
          EOF
          cat ${{ steps.create-apt-repo.outputs.dir }}/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages
          path: ${{ steps.create-apt-repo.outputs.dir }}

 
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Adding summary
        run: |
          echo ':rocket:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'curl -sfLo /tmp/${{ env.REPO_NAME }}.asc ${{ steps.deployment.outputs.page_url }}gpg.key' >> $GITHUB_STEP_SUMMARY
          echo 'sudo mv /tmp/${{ env.REPO_NAME }}.asc /etc/apt/keyrings/${{ env.REPO_NAME }}.asc' >> $GITHUB_STEP_SUMMARY
          echo 'echo  "deb [signed-by=/etc/apt/keyrings/${{ env.REPO_NAME }}.asc] ${{ steps.deployment.outputs.page_url }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}" | sudo tee /etc/apt/sources.list.d/${{ env.REPO_NAME }}.list' >> $GITHUB_STEP_SUMMARY
          echo 'sudo apt-get update' >> $GITHUB_STEP_SUMMARY
          echo 'sudo apt-get install moosh' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
