name: Publish Debian apt repository

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Debian package"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

env:
    REPO_NAME: moosh
    CODENAME: bookworm
    COMPONENTS: main
    ARCHITECTURES: amd64

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Debian package artifact
        uses: actions/download-artifact@v7
        with:
          name: debian-package
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id || github.run_id }}

      - name: Install package publishing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg

      - name: Prepare repository directory
        run: |
          mkdir -p public
          touch public/.nojekyll
          find dist -maxdepth 1 -type f -name '*.deb' -exec cp -v {} public/ \;

      - name: Create apt repository
        uses: morph027/apt-repo-action@v3
        id: create-apt-repo
        with:
          scan-dir: public
          maintainer: georg-bip-bot-bildung.gv.at@glas.eu.org
          repo-name: ${{ env.REPO_NAME }}
          signing-key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          signing-key-passphrase: ${{ secrets.APT_GPG_PASSPHRASE || '' }}
          codename: ${{ env.CODENAME }}
          components: ${{ env.COMPONENTS }}
          architectures: ${{ env.ARCHITECTURES }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages
          path: ${{ steps.create-apt-repo.outputs.dir }}

 
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Adding summary
        run: |
          echo ':rocket:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'curl -sfLo /etc/apt.trusted.gpg.d/${{ env.REPO_NAME }}.asc ${{ steps.deployment.outputs.page_url }}gpg.key' >> $GITHUB_STEP_SUMMARY
          echo 'echo "deb ${{ steps.deployment.outputs.page_url }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}" >/etc/apt/sources.list.d/${{ env.REPO_NAME }}.list' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
