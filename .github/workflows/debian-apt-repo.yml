name: Publish Debian apt repository

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Debian package"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

env:
    REPO_NAME: moosh
    CODENAME: bookworm
    COMPONENTS: main
    ARCHITECTURES: amd64

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Debian package artifact
        uses: actions/download-artifact@v7
        with:
          name: debian-package
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id || github.run_id }}

      - name: Install package publishing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg

      - name: Prepare repository directory
        run: |
          mkdir -p public
          touch public/.nojekyll
          find dist -maxdepth 1 -type f -name '*.deb' -exec cp {} public/ \;

      - name: Create apt repository
        uses: morph027/apt-repo-action@v3
        id: create-apt-repo
        with:
          scan-dir: public
          maintainer: georg-bip-bot-bildung.gv.at@glas.eu.org
          repo-name: ${{ env.REPO_NAME }}
          signing-key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          signing-key-passphrase: ${{ secrets.APT_GPG_PASSPHRASE || '' }}
          codename: ${{ env.CODENAME }}
          components: ${{ env.COMPONENTS }}
          architectures: ${{ env.ARCHITECTURES }}

